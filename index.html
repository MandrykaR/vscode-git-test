<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Images</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css"
      integrity="sha256-WAgYcAck1C1/zEl5sBl5cfyhxtLgKGdpI3oKyJffVRI="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <form >
      <div>
        <label for="lastName">Last Name</label>
        <input value="Emerson" name="lastName" type="text" readonly />
      </div>

      <div>
        <label for="Age">Age</label>
        <input value="17" min="3" max="10" name="age" type="number" required />
      </div>

      <div>
        <input
          disabled
          type="checkbox"
          name="agree"
          id=""
        />
        <label for="Accept terms and conditions">Accept terms and conditions</label>
      </div>

      <div class="choose-gender">
        <input type="radio" name="gender" checked />
        <label for="Male">Male</label>
        <input type="radio" name="gender" />
        <label for="Female">Female</label>
        <input type="radio" name="gender" />
        <label for="Secret">Secret</label>
      </div>
      <div>
        <textarea maxlength="10" name="description" placeholder="Write description..."></textarea>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
